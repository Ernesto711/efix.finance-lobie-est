<script type="text/babel">
const {useState,useMemo}=React;

/* ‚ïê‚ïê‚ïê MODELO COBB-DOUGLAS ‚Äî CALIBRADO LOBIE ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   ADR = ADR_ref √ó DI^Œ± √ó SM^Œ≤
   Œ±=0.60: demanda do bairro domina 60% do ADR
   Œ≤=0.40: atributos f√≠sicos da UH respondem por 40%
   SM = decay(dist) √ó floor √ó vista √ó tipo
   decay(d) = max(0.55, e^‚àí0.0035d) ‚Äî piso 0.55 = m√≠n. n√£o-praia
   floor = 1 + max(0, andar‚àí3) √ó 0.005 (+0.5%/andar acima 3¬∫)
   DI: AirDNA LTM Mar/2026 ‚Äî DI = 0.40√óocc + 0.35√órevpar + 0.25√óscore
   Ref: Ipanema DI=1.0, ADR_ref=R$795
   Sazonalidade: BD Repasse GCP 2025, 476 UHs reais
   Valida√ß√£o: MAPE 2.8% SAL Ipanema, 10.3% vista mar ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

const A=0.60,B=0.40,ADRREF=795,DIAS=30.42,OTA=0.165,TXL=0.12;

const BAIRROS={
  "Ipanema":      {di:1.000,occ:0.651},
  "Leblon":       {di:0.994,occ:0.641},
  "Leme":         {di:0.870,occ:0.635},
  "Copacabana":   {di:0.863,occ:0.640},
  "Flamengo":     {di:0.812,occ:0.552},
  "Urca":         {di:0.800,occ:0.540},
  "Botafogo":     {di:0.793,occ:0.625},
  "Humait√°":      {di:0.793,occ:0.625},
  "Catete":       {di:0.750,occ:0.600},
  "Gl√≥ria":       {di:0.740,occ:0.590},
  "Centro":       {di:0.720,occ:0.580},
  "Santa Teresa": {di:0.644,occ:0.542},
  "Cosme Velho":  {di:0.610,occ:0.494},
};
const VISTAS=[
  {key:"sem_vista",      label:"Sem vista",   short:"‚Äî",     m:1.00,desc:"base"},
  {key:"vista_rua",      label:"Vista rua",   short:"Rua",   m:1.12,desc:"+12%"},
  {key:"vista_verde",    label:"Vista verde", short:"Verde", m:1.18,desc:"+18%"},
  {key:"vista_mar_parc", label:"Mar parcial", short:"Mar‚Üó",  m:1.38,desc:"+38%"},
  {key:"vista_mar_total",label:"Mar total",   short:"Mar‚ú¶",  m:1.80,desc:"+80%"},
];
const TIPOS=[
  {key:"studio",label:"Studio",   m:1.00,desc:"base"},
  {key:"1q",    label:"1 Quarto", m:1.15,desc:"+15%"},
  {key:"2q",    label:"2 Quartos",m:1.28,desc:"+28%"},
];

function sm(u,dist){
  const decay=Math.max(0.55,Math.exp(-0.0035*dist));
  const floor=1+Math.max(0,u.andar-3)*0.005;
  const vm=VISTAS.find(v=>v.key===u.vista)?.m??1;
  const tm=TIPOS.find(t=>t.key===u.tipo)?.m??1;
  return{SM:decay*floor*vm*tm,decay,floor,vm,tm};
}

function calc(u,proj,bd){
  const preco=u.area*(proj.precoM2||0);
  const{SM,decay,floor,vm,tm}=sm(u,proj.distPraia);
  const adr=ADRREF*Math.pow(bd.di,A)*Math.pow(SM,B);
  const recB=adr*bd.occ*DIAS,recL=recB*(1-OTA);
  const ni=recL-proj.cond-proj.energia-proj.iptu;
  const res=ni*(1-TXL);
  const y=preco>0?Math.max(0,res*12/preco*100):0;
  return{...u,preco,SM,decay,floor,vm,tm,adr:Math.round(adr),occ:bd.occ,recB,recL,ni,res,y,rpm:(adr*bd.occ)/u.area};
}

function calcL(r,proj){
  const occL=proj.occLobie/100;
  const recBL=(proj.adrLobie||0)*occL*DIAS,recLL=recBL*(1-OTA);
  const niL=recLL-proj.cond-proj.energia-proj.iptu;
  const resL=niL*(1-TXL);
  const yL=r.preco>0?Math.max(0,resL*12/r.preco*100):0;
  return{resL,yL};
}

function yc(y){
  if(y>=14)return{cls:"bg",bg:"#f0fdf4",bo:"#bbf7d0",tc:"#16a34a"};
  if(y>=12)return{cls:"bb2",bg:"#eff6ff",bo:"#bfdbfe",tc:"#2563eb"};
  if(y>=10)return{cls:"ba",bg:"#fffbeb",bo:"#fde68a",tc:"#d97706"};
  if(y>=8) return{cls:"br",bg:"#fef2f2",bo:"#fecaca",tc:"#dc2626"};
           return{cls:"br",bg:"#fff1f2",bo:"#fecdd3",tc:"#e11d48"};
}

const brl=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const pct=n=>n.toFixed(1)+'%';
const today=new Date().toLocaleDateString('pt-BR');

/* ‚ïê‚ïê‚ïê MONTE CARLO + HEATMAP ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   Simula√ß√£o estoc√°stica por UH: ADR~N(Œº,7%œÉ), OCC~œÉ=5pp, OTA~N(16.5%,1.5%)
   Gera faixa P10/P50/P90 e prob(DY>12%). Paralela ao cen√°rio Lobie. */
const gauss=()=>{const u=Math.random()+1e-9,v=Math.random()+1e-9;return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
const NMC=1000;
function mc(r,proj,bd,adrL,occL){
  const run=(adrMu,occMu)=>{
    const ys=[],rs=[];
    for(let i=0;i<NMC;i++){
      const a=Math.max(0,adrMu+adrMu*0.07*gauss());
      const o=Math.min(.95,Math.max(.2,occMu+0.05*gauss()));
      const ot=Math.min(.22,Math.max(.12,OTA+0.015*gauss()));
      const rL=a*o*DIAS*(1-ot);
      const ni=rL-proj.cond-proj.energia-proj.iptu;
      const res=ni*(1-TXL);
      const y=r.preco>0?Math.max(0,res*12/r.preco*100):0;
      ys.push(y);rs.push(res);
    }
    ys.sort((a,b)=>a-b);rs.sort((a,b)=>a-b);
    const q=(a,p)=>a[Math.floor((a.length-1)*p)];
    return{p10:q(ys,.1),p50:q(ys,.5),p90:q(ys,.9),p10r:q(rs,.1),p50r:q(rs,.5),p90r:q(rs,.9),prob12:ys.filter(v=>v>=12).length/NMC*100};
  };
  return{nat:run(r.adr,bd.occ),lb:(adrL>0&&occL>0)?run(adrL,occL/100):null};
}
/* ‚ïê‚ïê‚ïê PARSER DO QUADRO DE √ÅREAS (Decreto 16721/98 RJ) ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   3 padr√µes: UH direta (pav 2), range "301 AO 2001" (pav 3-20 √ó 18),
   cobertura "UNID. 2101" (pav 21). Extrai ID, √°rea √∫til, pavimento. */
function parsePlantaText(text){
  const units=[];let nid=1;
  const nf=s=>parseFloat(String(s).replace(/\./g,'').replace(',','.'));
  const lines=text.split(/\r?\n/);
  for(const raw of lines){
    const l=raw.trim();
    let m=l.match(/^(\d{3})\s+([\d,]+)\s+([\d,]+)\s+[\d,.\-]+\s+1\s+[\d.,]+\s+m.?\s+([\d,]+)\s*m/);
    if(m){const uid=m[1],au=nf(m[3]),pav=parseInt(uid[0]);units.push({id:nid++,nome:uid,area:au,andar:pav,vista:'sem_vista',tipo:'studio'});continue;}
    m=l.match(/^(\d{3})\s+AO\s+(\d{4})\s+([\d,]+)\s+([\d,]+)\s+[\d,.\-]+\s+(\d+)\s+[\d.,]+\s+m.?\s+([\d,]+)\s*m/);
    if(m){
      const start=parseInt(m[1]),end=parseInt(m[2]),count=parseInt(m[5]),auTotal=nf(m[6]);
      const au=Math.round((auTotal/count)*100)/100;
      const pos=start%100,sf=Math.floor(start/100),ef=Math.floor(end/100);
      for(let f=sf;f<=ef;f++){
        const uid=f<10?`${f}${String(pos).padStart(2,'0')}`:`${f}${String(pos).padStart(2,'0')}`;
        units.push({id:nid++,nome:uid,area:au,andar:f,vista:'sem_vista',tipo:'studio'});
      }
      continue;
    }
    m=l.match(/^UNID\.?\s+(\d{4})\s+([\d,]+)\s+([\d,]+)\s+[\d,.\-]+\s+1\s+[\d.,]+\s+m.?\s+([\d,]+)\s*m/);
    if(m){const uid=m[1],au=nf(m[4]),pav=parseInt(uid.slice(0,2));units.push({id:nid++,nome:uid,area:au,andar:pav,vista:'sem_vista',tipo:'studio'});}
  }
  return units;
}
async function extractPdfText(file){
  if(!window.pdfjsLib) throw new Error('PDF.js n√£o carregou');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    const rows={};
    content.items.forEach(it=>{
      const y=Math.round(it.transform[5]);
      if(!rows[y])rows[y]=[];
      rows[y].push({x:it.transform[4],s:it.str});
    });
    const ys=Object.keys(rows).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{text+=rows[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ')+'\n';});
  }
  return text;
}

const HMPAL=["#e04545","#e8a33c","#ffb547","#d4e157","#6bc76b","#14c990","#0bc0ed"];
const hmColor=t=>{
  t=Math.max(0,Math.min(1,t||0));
  const x=t*(HMPAL.length-1),i0=Math.floor(x),i1=Math.min(HMPAL.length-1,i0+1),f=x-i0;
  const p=s=>[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];
  const a=p(HMPAL[i0]),b=p(HMPAL[i1]);
  return`rgb(${Math.round(a[0]+(b[0]-a[0])*f)},${Math.round(a[1]+(b[1]-a[1])*f)},${Math.round(a[2]+(b[2]-a[2])*f)})`;
};

const P0={nome:"Piraj√° 640",endereco:"Rua Visconde de Piraj√°, 640",bairro:"Humait√°",distPraia:1200,precoM2:22000,cond:800,energia:380,iptu:280,adrLobie:750,occLobie:85};
const U0=[
  {id:1,nome:"Std 01",area:40.39,andar:2,vista:"sem_vista",tipo:"studio"},
  {id:2,nome:"Std 02",area:36.03,andar:2,vista:"sem_vista",tipo:"studio"},
  {id:3,nome:"Std 03",area:35.28,andar:2,vista:"sem_vista",tipo:"studio"},
  {id:4,nome:"Std 04",area:36.03,andar:2,vista:"sem_vista",tipo:"studio"},
  {id:5,nome:"Std 05",area:40.39,andar:2,vista:"sem_vista",tipo:"studio"},
  {id:6,nome:"Cob. A",area:45.76,andar:7,vista:"vista_verde",tipo:"studio"},
  {id:7,nome:"Cob. B",area:46.94,andar:7,vista:"vista_verde",tipo:"studio"},
  {id:8,nome:"Ct. 01",area:45.31,andar:8,vista:"vista_verde",tipo:"studio"},
  {id:9,nome:"Ct. 02",area:45.31,andar:8,vista:"vista_verde",tipo:"studio"},
  {id:10,nome:"Ct. 03",area:45.31,andar:8,vista:"vista_verde",tipo:"studio"},
  {id:11,nome:"Ct. 04",area:45.31,andar:8,vista:"vista_verde",tipo:"studio"},
];

function App(){
  const[step,setStep]=useState(1);
  const[proj,setProj]=useState(P0);
  const[units,setUnits]=useState(U0);
  const[nid,setNid]=useState(12);
  const[sb,setSb]=useState("y");
  const[sd,setSd]=useState(-1);
  const[showM,setShowM]=useState(false);

  const bd=BAIRROS[proj.bairro]||BAIRROS["Ipanema"];
  const results=useMemo(()=>units.map(u=>calc(u,proj,bd)),[units,proj,bd]);
  const sorted=useMemo(()=>[...results].sort((a,b)=>(b[sb]-a[sb])*sd),[results,sb,sd]);
  const byFloor=useMemo(()=>{
    const m={};results.forEach(r=>{if(!m[r.andar])m[r.andar]=[];m[r.andar].push(r);});
    return Object.entries(m).sort((a,b)=>+b[0]-+a[0]);
  },[results]);

  const mcData=useMemo(()=>{const m={};results.forEach(r=>{m[r.id]=mc(r,proj,bd,proj.adrLobie,proj.occLobie);});return m;},[results,proj,bd]);

        <div>
          <div style={{fontSize:18,fontWeight:700,letterSpacing:-.3,lineHeight:1.1}}>{r.nome}</div>
          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase",letterSpacing:.7,marginTop:5,fontWeight:600,lineHeight:1.5}}>
            {tipo?.label} ¬∑ Pav. {r.andar} ¬∑ {vista?.label}
          </div>
        </div>
        <span className={`badge ${cn.cls}`} style={{fontFamily:"'Space Mono',monospace",fontSize:11,padding:"4px 10px",whiteSpace:"nowrap"}}>DY {pct(r.y)}</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 10px",fontSize:10,marginBottom:13}}>
        <span style={{color:"var(--text3)"}}>√Årea √∫til</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{r.area}m¬≤</span>
        <span style={{color:"var(--text3)"}}>SM</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600,color:r.SM>0.8?"var(--green)":r.SM>0.65?"var(--amber)":"var(--red)"}}>{r.SM.toFixed(3)}</span>
        <span style={{color:"var(--text3)"}}>ADR estimado</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(r.adr)}</span>
        <span style={{color:"var(--text3)"}}>Ocupa√ß√£o</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{pct(r.occ*100)}</span>
        <span style={{color:"var(--text3)"}}>Pre√ßo tabela</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(r.preco)}</span>
        <span style={{color:"var(--text3)"}}>R$/m¬≤</span><span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(Math.round(r.preco/r.area))}</span>
      </div>

      <div style={{fontSize:9,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>DRE mensal</div>
      <table style={{width:"100%",fontSize:11,borderCollapse:"collapse",marginBottom:6}}>
        <tbody>
          {dre.map(([l,v,c,hi],i)=>(
            <tr key={i}>
              <td style={{padding:"4px 0",color:hi?"var(--green)":"var(--text2)",fontWeight:hi?700:400,borderTop:hi?"1px solid var(--border)":"none",fontSize:hi?11:10}}>{l}</td>
              <td style={{padding:"4px 0",textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:hi?700:500,color:c,borderTop:hi?"1px solid var(--border)":"none",fontSize:hi?12:11}}>
                {brl(Math.round(v))}
              </td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* MC INTERVAL */}
      <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--bg3)"}}>
        <div style={{fontSize:9,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>
          Monte Carlo ¬∑ {NMC.toLocaleString('pt-BR')} cen√°rios
        </div>
        {(()=>{const rng=15,o=5;
          const l=Math.max(0,Math.min(100,((mc.nat.p10-o)/rng)*100));
          const r2=Math.max(2,Math.min(100,((mc.nat.p90-mc.nat.p10)/rng)*100));
          const mid=Math.max(0,Math.min(100,((mc.nat.p50-o)/rng)*100));
          const thr=Math.max(0,Math.min(100,((12-o)/rng)*100));
          return (
            <div style={{position:"relative",height:9,background:"var(--bg3)",borderRadius:5,marginBottom:5}}>
              <div style={{position:"absolute",left:`${l}%`,width:`${r2}%`,top:0,bottom:0,borderRadius:5,background:`linear-gradient(90deg,${hmColor((mc.nat.p10-o)/rng)},${hmColor((mc.nat.p90-o)/rng)})`}}/>
              <div style={{position:"absolute",left:`${mid}%`,top:-3,bottom:-3,width:2,background:"var(--acc)"}}/>
              <div style={{position:"absolute",left:`${thr}%`,top:-4,bottom:-4,width:1,borderLeft:"1px dashed var(--text3)",opacity:.6}}/>
            </div>
          );
        })()}
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,fontFamily:"'Space Mono',monospace"}}>
          <span style={{color:"var(--text3)"}}>P10 <b>{pct(mc.nat.p10)}</b></span>
          <b style={{color:"var(--acc)"}}>P50 {pct(mc.nat.p50)}</b>
          <span style={{color:"var(--text3)"}}>P90 <b>{pct(mc.nat.p90)}</b></span>
        </div>
        <div style={{marginTop:10,padding:"9px 12px",background:mc.nat.prob12>=50?"var(--gbg)":"var(--abg)",border:`1px solid ${mc.nat.prob12>=50?"var(--gb)":"var(--ab)"}`,borderRadius:9,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <span style={{fontSize:10,color:"var(--text2)",fontWeight:600}}>Prob. DY &gt; 12% a.a.</span>
          <b style={{fontFamily:"'Space Mono',monospace",fontSize:16,color:mc.nat.prob12>=50?"var(--green)":"var(--amber)"}}>{pct(mc.nat.prob12)}</b>
        </div>
        <div style={{marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 9px"}}>
            <div style={{fontSize:8,color:"var(--text3)",textTransform:"uppercase",letterSpacing:.5,fontWeight:700}}>Res. P10</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,marginTop:2}}>{brl(Math.round(mc.nat.p10r))}</div>
          </div>
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 9px"}}>
            <div style={{fontSize:8,color:"var(--text3)",textTransform:"uppercase",letterSpacing:.5,fontWeight:700}}>Res. P90</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,marginTop:2}}>{brl(Math.round(mc.nat.p90r))}</div>
          </div>
        </div>
      </div>

      {/* LOBIE */}
      {hasL&&mc.lb&&(
        <div style={{marginTop:13,paddingTop:12,borderTop:"1px solid var(--bg3)"}}>
          <div style={{fontSize:9,fontWeight:700,color:"var(--acc)",textTransform:"uppercase",letterSpacing:.8,marginBottom:9}}>
            Cen√°rio Lobie ¬∑ gest√£o
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px 10px",fontSize:10}}>
            <span style={{color:"var(--text3)"}}>ADR / OCC</span>
            <span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(proj.adrLobie)} ¬∑ {pct(proj.occLobie)}</span>
            <span style={{color:"var(--text3)"}}>Resultado/m√™s</span>
            <span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:700,color:cl.tc}}>{brl(Math.round(resL))}</span>
            <span style={{color:"var(--text3)"}}>Yield anual</span>
            <span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:700,color:cl.tc}}>{pct(yL)}</span>
            <span style={{color:"var(--text3)"}}>Prob. &gt;12%</span>
            <span style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontWeight:700,color:mc.lb.prob12>=50?"var(--green)":"var(--amber)"}}>{pct(mc.lb.prob12)}</span>
          </div>
          <div style={{marginTop:9,padding:"8px 10px",background:delt>=0?"var(--gbg)":"var(--rbg)",border:`1px solid ${delt>=0?"var(--gb)":"var(--rb)"}`,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={{fontSize:10,color:"var(--text2)",fontWeight:600}}>Valor da gest√£o Lobie</span>
            <b style={{fontFamily:"'Space Mono',monospace",fontSize:14,color:delt>=0?"var(--green)":"var(--red)"}}>{delt>=0?"+":""}{pct(delt)}</b>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
