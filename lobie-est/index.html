<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOBIE | Estudo de Rentabilidade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#fafafa;--bg3:#efefef;--card:#ffffff;
  --border:#d4d4d4;--border2:#e5e5e5;
  --text:#0a0a0a;--text2:#525252;--text3:#a3a3a3;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-b:#fecaca;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-b:#fde68a;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#bfdbfe;
  --cyan:#0891b2;--purple:#7c3aed;--accent:#000000;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text)}
.shell{display:flex;flex-direction:column;min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;height:48px;z-index:100;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:800}
.logo span{color:var(--text2);font-weight:400;font-size:11px;margin-left:8px;letter-spacing:1px;text-transform:uppercase}

.steps-nav{display:flex;gap:0;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);height:38px;flex-shrink:0;align-items:stretch}
.step-tab{padding:0 20px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;display:flex;align-items:center;gap:7px}
.step-tab:hover{color:var(--text)}
.step-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.step-tab.done{color:var(--green);cursor:pointer}
.snum{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:var(--bg3);color:var(--text2);flex-shrink:0}
.step-tab.active .snum{background:var(--accent);color:#fff}
.step-tab.done .snum{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.nav-info{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);font-weight:600;padding-right:4px}

.btn{padding:6px 14px;border-radius:50px;border:1px solid var(--border);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text);letter-spacing:.3px;white-space:nowrap}
.btn:hover{border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:#333}
.btn-lg{padding:10px 28px;font-size:13px}

input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:12px;font-size:13px;width:100%;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent);background:var(--bg)}
select option{background:#fff}
input[type=number]::-webkit-inner-spin-button{opacity:.3}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.ctitle{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:14px}

.badge{font-size:11px;padding:3px 10px;border-radius:50px;font-weight:600;letter-spacing:.3px}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.ba{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}

.mkpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s;overflow:hidden}
.mkpi:hover{border-color:var(--accent)}
.mkpi-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.mkpi-v{font-family:'Space Mono',monospace;font-size:20px;font-weight:600;margin:4px 0;line-height:1}
.mkpi-t{font-size:10px;color:var(--text3);font-weight:600}
.mkpi-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.mkpi-bar-f{height:100%;border-radius:2px;transition:width .8s}

.ucard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;transition:transform .15s,box-shadow .15s,border-color .15s}
.ucard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07);border-color:var(--accent)}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--text2);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:default}
.tbl th.sortable{cursor:pointer}.tbl th.sortable:hover{color:var(--text)}
.tbl th.sorted{color:var(--accent)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bg3)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg2)}

.itbl th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--text2);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2)}
.itbl td{padding:6px 10px;border-bottom:1px solid var(--bg3)}
.itbl td input,.itbl td select{border-radius:8px;padding:6px 9px;font-size:12px}
.itbl tbody tr:nth-child(even) td{background:rgba(0,0,0,.013)}

.view{padding:20px 24px;flex:1}
.step-fade{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media print{
  .topbar,.steps-nav,.no-print{display:none!important}
  .view{padding:10px!important}
  .ucard{break-inside:avoid;box-shadow:none!important;transform:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;

const A=0.60,B=0.40,ADRREF=795,DIAS=30.42,OTA=0.165,TXL=0.12;

const BAIRROS={
  "Ipanema":{di:1.000,occ:0.651},"Leblon":{di:0.994,occ:0.641},
  "Leme":{di:0.870,occ:0.635},"Copacabana":{di:0.863,occ:0.640},
  "Flamengo":{di:0.812,occ:0.552},"Urca":{di:0.800,occ:0.540},
  "Botafogo":{di:0.793,occ:0.625},"Humaitá":{di:0.793,occ:0.625},
  "Catete":{di:0.750,occ:0.600},"Glória":{di:0.740,occ:0.590},
  "Santa Teresa":{di:0.644,occ:0.542},"Cosme Velho":{di:0.610,occ:0.494},
};
const VISTAS=[
  {key:"sem_vista",label:"Sem vista",short:"—",m:1.00},
  {key:"vista_rua",label:"Vista rua",short:"Rua",m:1.12},
  {key:"vista_verde",label:"Vista verde",short:"Verde",m:1.18},
  {key:"vista_mar_parc",label:"Mar parcial",short:"Mar↗",m:1.38},
  {key:"vista_mar_total",label:"Mar total",short:"Mar✦",m:1.80},
];
const TIPOS=[
  {key:"studio",label:"Studio",m:1.00},
  {key:"1q",label:"1 Quarto",m:1.15},
  {key:"2q",label:"2 Quartos",m:1.28},
];

function calc(u,proj,bd){
  const decay=Math.max(0.55,Math.exp(-0.0035*proj.distPraia));
  const floor=1+Math.max(0,u.andar-3)*0.005;
  const vm=VISTAS.find(v=>v.key===u.vista)?.m??1;
  const tm=TIPOS.find(t=>t.key===u.tipo)?.m??1;
  const SM=decay*floor*vm*tm;
  const adr=ADRREF*Math.pow(bd.di,A)*Math.pow(SM,B);
  const recB=adr*bd.occ*DIAS;
  const recL=recB*(1-OTA);
  const ni=recL-proj.cond-proj.energia-proj.iptu;
  const res=ni*(1-TXL);
  const y=u.preco>0?Math.max(0,res*12/u.preco*100):0;
  return{...u,adr:Math.round(adr),occ:bd.occ,recB,recL,ni,res,y,rpm:(adr*bd.occ)/u.area};
}

function yc(y){
  if(y>=14)return{cls:"bg",bg:"#f0fdf4",bo:"#bbf7d0",tc:"#16a34a",label:"≥ 14%"};
  if(y>=12)return{cls:"bb",bg:"#eff6ff",bo:"#bfdbfe",tc:"#2563eb",label:"≥ 12%"};
  if(y>=10)return{cls:"ba",bg:"#fffbeb",bo:"#fde68a",tc:"#d97706",label:"≥ 10%"};
  if(y>=8) return{cls:"br",bg:"#fef2f2",bo:"#fecaca",tc:"#dc2626",label:"≥ 8%"};
           return{cls:"br",bg:"#fff1f2",bo:"#fecdd3",tc:"#e11d48",label:"< 8%"};
}

const brl=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const pct=n=>n.toFixed(1)+'%';
const today=new Date().toLocaleDateString('pt-BR');

const P0={nome:"Pirajá 640",endereco:"Rua Visconde de Pirajá, 640",bairro:"Humaitá",distPraia:1200,cond:800,energia:380,iptu:280};
const U0=[
  {id:1,nome:"Std 01",area:40.39,andar:2,vista:"sem_vista",tipo:"studio",preco:780000},
  {id:2,nome:"Std 02",area:36.03,andar:2,vista:"sem_vista",tipo:"studio",preco:695000},
  {id:3,nome:"Std 03",area:35.28,andar:2,vista:"sem_vista",tipo:"studio",preco:680000},
  {id:4,nome:"Std 04",area:36.03,andar:2,vista:"sem_vista",tipo:"studio",preco:695000},
  {id:5,nome:"Std 05",area:40.39,andar:2,vista:"sem_vista",tipo:"studio",preco:780000},
  {id:6,nome:"Cob. A",area:45.76,andar:7,vista:"vista_verde",tipo:"studio",preco:980000},
  {id:7,nome:"Cob. B",area:46.94,andar:7,vista:"vista_verde",tipo:"studio",preco:980000},
  {id:8,nome:"Ct. 01",area:45.31,andar:8,vista:"vista_verde",tipo:"studio",preco:1100000},
  {id:9,nome:"Ct. 02",area:45.31,andar:8,vista:"vista_verde",tipo:"studio",preco:1100000},
  {id:10,nome:"Ct. 03",area:45.31,andar:8,vista:"vista_verde",tipo:"studio",preco:1100000},
  {id:11,nome:"Ct. 04",area:45.31,andar:8,vista:"vista_verde",tipo:"studio",preco:1100000},
];

function App(){
  const[step,setStep]=useState(1);
  const[proj,setProj]=useState(P0);
  const[units,setUnits]=useState(U0);
  const[nid,setNid]=useState(12);
  const[sb,setSb]=useState("y");
  const[sd,setSd]=useState(-1);

  const bd=BAIRROS[proj.bairro]||BAIRROS["Ipanema"];
  const results=useMemo(()=>units.map(u=>calc(u,proj,bd)),[units,proj,bd]);
  const sorted=useMemo(()=>[...results].sort((a,b)=>(b[sb]-a[sb])*sd),[results,sb,sd]);
  const byFloor=useMemo(()=>{
    const m={};results.forEach(r=>{if(!m[r.andar])m[r.andar]=[];m[r.andar].push(r);});
    return Object.entries(m).sort((a,b)=>+b[0]-+a[0]);
  },[results]);

  const vgv=units.reduce((s,u)=>s+u.preco,0);
  const avgY=results.length?results.reduce((s,r)=>s+r.y,0)/results.length:0;
  const avgA=results.length?results.reduce((s,r)=>s+r.adr,0)/results.length:0;
  const best=results.length?[...results].sort((a,b)=>b.y-a.y)[0]:null;

  const upP=(f,v)=>setProj(p=>({...p,[f]:['nome','endereco','bairro'].includes(f)?v:+v}));
  const add=()=>{setUnits(u=>[...u,{id:nid,nome:`UH ${nid}`,area:35,andar:2,vista:"sem_vista",tipo:"studio",preco:700000}]);setNid(n=>n+1);};
  const del=id=>setUnits(u=>u.filter(x=>x.id!==id));
  const upU=(id,f,v)=>setUnits(u=>u.map(x=>x.id===id?{...x,[f]:['nome','vista','tipo'].includes(f)?v:+v}:x));
  const ts=f=>{if(sb===f)setSd(d=>-d);else{setSb(f);setSd(-1);}};

  return(
    <div className="shell">

      {/* TOPBAR */}
      <div className="topbar">
        <div className="logo">LOBIE <span>Estudo de Rentabilidade</span></div>
        <div style={{display:"flex",gap:6}} className="no-print">
          {step===3&&<button className="btn btn-p" onClick={()=>window.print()}>Exportar PDF</button>}
        </div>
      </div>

      {/* STEPS NAV */}
      <div className="steps-nav no-print">
        {[["1","Projeto",1],["2","Unidades",2],["3","Resultados",3]].map(([n,l,s])=>(
          <div key={s} className={`step-tab${step===s?" active":step>s?" done":""}`}
            onClick={()=>step>s&&setStep(s)}>
            <div className="snum">{step>s?"✓":n}</div>{l}
          </div>
        ))}
        {step===3&&(
          <div className="nav-info">
            <span>{proj.nome}</span>
            <span style={{color:"var(--border)"}}>·</span>
            <span>{units.length} UHs</span>
            <span style={{color:"var(--border)"}}>·</span>
            <span style={{fontFamily:"'Space Mono',monospace"}}>{brl(vgv)}</span>
          </div>
        )}
      </div>

      {/* ─── STEP 1 ─── */}
      {step===1&&(
        <div className="view step-fade">
          <div style={{maxWidth:860,margin:"0 auto"}}>
            <h1 style={{fontSize:26,fontWeight:700,letterSpacing:"-.5px",marginBottom:6}}>Novo Estudo</h1>
            <p style={{fontSize:13,color:"var(--text2)",marginBottom:28}}>Configure o empreendimento. O bairro determina o DemandIndex automaticamente via AirDNA.</p>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div className="card">
                <div className="ctitle">Identificação</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <FG l="Nome do empreendimento"><input value={proj.nome} onChange={e=>upP('nome',e.target.value)}/></FG>
                  <FG l="Endereço"><input value={proj.endereco} onChange={e=>upP('endereco',e.target.value)}/></FG>
                  <FG l="Bairro — define DemandIndex automaticamente">
                    <select value={proj.bairro} onChange={e=>upP('bairro',e.target.value)}>
                      {Object.keys(BAIRROS).map(b=><option key={b}>{b}</option>)}
                    </select>
                  </FG>
                  <FG l="Distância da praia (metros)"><input type="number" value={proj.distPraia} onChange={e=>upP('distPraia',e.target.value)}/></FG>
                </div>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div className="card">
                  <div className="ctitle">Despesas mensais padrão (aplicadas a todas as UHs)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                    <FG l="Condomínio"><input type="number" value={proj.cond} onChange={e=>upP('cond',e.target.value)}/></FG>
                    <FG l="Energia"><input type="number" value={proj.energia} onChange={e=>upP('energia',e.target.value)}/></FG>
                    <FG l="IPTU/mês"><input type="number" value={proj.iptu} onChange={e=>upP('iptu',e.target.value)}/></FG>
                  </div>
                </div>

                <div style={{background:"var(--green-bg)",border:"1px solid var(--green-b)",borderRadius:16,padding:"16px 20px"}}>
                  <div style={{fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",color:"var(--green)",marginBottom:14}}>Parâmetros de Mercado · AirDNA LTM</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                    {(()=>{
                      const decayRef=Math.max(0.55,Math.exp(-0.0035*proj.distPraia));
                      const adrEst=Math.round(ADRREF*Math.pow(bd.di,A)*Math.pow(decayRef,B));
                      return [["Bairro",proj.bairro,false,null],["DemandIndex",bd.di.toFixed(3),true,"var(--accent)"],["Ocupação LTM",pct(bd.occ*100),true,"var(--green)"],["ADR estimado",brl(adrEst),true,"var(--accent)"]].map(([l,v,mono,c])=>(
                        <div key={l} style={{background:"rgba(255,255,255,.7)",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                          <div style={{fontFamily:mono?"'Space Mono',monospace":"'Syne',sans-serif",fontSize:mono?13:12,fontWeight:600,color:c||"var(--text)",lineHeight:1}}>{v}</div>
                          <div style={{fontSize:9,color:"var(--text2)",marginTop:5,fontWeight:600,letterSpacing:.3,textTransform:"uppercase"}}>{l}</div>
                        </div>
                      ));
                    })()}
                  </div>
                  <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--green-b)",fontSize:10,color:"#6b9f7a",fontWeight:500,lineHeight:1.7}}>
                    ADR = R$795 × DI<sup>0.60</sup> × SM<sup>0.40</sup> · Fonte: {today}
                  </div>
                </div>
              </div>
            </div>

            <div style={{marginTop:24,display:"flex",justifyContent:"flex-end"}}>
              <button className="btn btn-p btn-lg" onClick={()=>setStep(2)}>Configurar Unidades →</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── STEP 2 ─── */}
      {step===2&&(
        <div className="view step-fade">
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div>
              <h1 style={{fontSize:22,fontWeight:700,letterSpacing:"-.3px"}}>
                {proj.nome} &nbsp;<span className="badge bb">{units.length} UHs</span>
              </h1>
              <p style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{proj.endereco} · {proj.bairro} · DI {bd.di.toFixed(3)} · VGV <span style={{fontFamily:"'Space Mono',monospace"}}>{brl(vgv)}</span></p>
            </div>
            <button className="btn" onClick={add}>+ Adicionar UH</button>
          </div>

          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}} className="itbl">
                <thead><tr>{["Nome","Área m²","Andar","Vista","Tipologia","Preço R$",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {units.map(u=>(
                    <tr key={u.id}>
                      <td><input value={u.nome} onChange={e=>upU(u.id,'nome',e.target.value)} style={{width:76}}/></td>
                      <td><input type="number" step=".01" value={u.area} onChange={e=>upU(u.id,'area',e.target.value)} style={{width:72}}/></td>
                      <td><input type="number" min="1" max="60" value={u.andar} onChange={e=>upU(u.id,'andar',e.target.value)} style={{width:56}}/></td>
                      <td><select value={u.vista} onChange={e=>upU(u.id,'vista',e.target.value)} style={{width:130}}>{VISTAS.map(v=><option key={v.key} value={v.key}>{v.label}</option>)}</select></td>
                      <td><select value={u.tipo} onChange={e=>upU(u.id,'tipo',e.target.value)} style={{width:106}}>{TIPOS.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}</select></td>
                      <td><input type="number" value={u.preco} onChange={e=>upU(u.id,'preco',e.target.value)} style={{width:110}}/></td>
                      <td style={{textAlign:"center"}}>
                        <button onClick={()=>del(u.id)} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:18,opacity:.5,transition:"opacity .15s",padding:"0 6px"}}
                          onMouseOver={e=>e.target.style.opacity=1} onMouseOut={e=>e.target.style.opacity=.5}>×</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:"10px 16px",borderTop:"1px solid var(--bg3)",background:"var(--bg2)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:12,color:"var(--text2)"}}><b style={{color:"var(--text)"}}>{units.length} unidades</b> &nbsp;·&nbsp; VGV <b style={{fontFamily:"'Space Mono',monospace"}}>{brl(vgv)}</b></span>
              <button className="btn" onClick={add} style={{fontSize:11}}>+ UH</button>
            </div>
          </div>

          <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}>
            <button className="btn" onClick={()=>setStep(1)}>← Voltar</button>
            <button className="btn btn-p btn-lg" onClick={()=>setStep(3)}>Ver Resultados →</button>
          </div>
        </div>
      )}

      {/* ─── STEP 3 ─── */}
      {step===3&&(
        <div className="view step-fade">
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
            <div>
              <h1 style={{fontSize:22,fontWeight:700,letterSpacing:"-.3px",lineHeight:1.1}}>{proj.nome}</h1>
              <p style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{proj.endereco} &nbsp;·&nbsp; {proj.bairro} &nbsp;·&nbsp; DI {bd.di.toFixed(3)} &nbsp;·&nbsp; {units.length} UHs &nbsp;·&nbsp; {today}</p>
            </div>
            <div style={{display:"flex",gap:6}} className="no-print">
              <button className="btn" onClick={()=>setStep(2)}>← Editar</button>
              <button className="btn btn-p" onClick={()=>window.print()}>Exportar PDF</button>
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
            <div className="mkpi">
              <div className="mkpi-l">Total de UHs</div>
              <div className="mkpi-v">{units.length}</div>
              <div className="mkpi-t">VGV {brl(vgv)}</div>
            </div>
            <div className="mkpi">
              <div className="mkpi-l">ADR médio</div>
              <div className="mkpi-v">{brl(Math.round(avgA))}</div>
              <div className="mkpi-t">{pct(bd.occ*100)} occ · {proj.bairro}</div>
            </div>
            <div className="mkpi" style={{borderTop:"2px solid var(--green)"}}>
              <div className="mkpi-l">Yield médio portfólio</div>
              <div className="mkpi-v" style={{color:"var(--green)"}}>{pct(avgY)}</div>
              <div className="mkpi-t">modelo natural a.a.</div>
              <div className="mkpi-bar"><div className="mkpi-bar-f" style={{width:Math.min(100,(avgY/15)*100)+"%",background:"var(--green)"}}/></div>
            </div>
            <div className="mkpi" style={{borderTop:"2px solid var(--accent)"}}>
              <div className="mkpi-l">Melhor UH</div>
              <div className="mkpi-v" style={{fontSize:16}}>{best?.nome??'—'}</div>
              <div className="mkpi-t">{best?pct(best.y)+" a.a. · "+best.area+"m²":""}</div>
            </div>
          </div>

          {/* Legenda */}
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:600,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginRight:4}}>Yield:</span>
            {[14,12,10,8,0].map(y=>{const c=yc(y+.1);return(
              <span key={y} className={`badge ${c.cls}`} style={{fontSize:10}}>{c.label}</span>
            );})}
          </div>

          {/* HEATMAP */}
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:18,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text2)"}}>Mapa de Rentabilidade por Pavimento</div>
              <div style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>{units.length} unidades · modelo natural Cobb-Douglas</div>
            </div>

            {byFloor.map(([floor,fus])=>(
              <div key={floor} style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <span style={{background:"var(--bg3)",borderRadius:8,padding:"2px 10px",fontSize:10,fontWeight:600,fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap"}}>{floor}º andar</span>
                  <span style={{fontSize:10,color:"var(--text3)",fontWeight:600,whiteSpace:"nowrap"}}>{fus.length} UH{fus.length>1?"s":""}</span>
                  <div style={{flex:1,height:1,background:"var(--border)"}}/>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {fus.map(r=>{
                    const c=yc(r.y);
                    return(
                      <div key={r.id} className="ucard" style={{background:c.bg,border:`1px solid ${c.bo}`,minWidth:152,maxWidth:184}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <span style={{fontSize:13,fontWeight:600}}>{r.nome}</span>
                          <span className={`badge ${c.cls}`} style={{fontSize:9}}>{c.label}</span>
                        </div>
                        <div style={{fontSize:11,color:"var(--text2)",marginBottom:8,fontWeight:600}}>
                          {r.area}m² &nbsp;·&nbsp; {VISTAS.find(v=>v.key===r.vista)?.short}
                        </div>
                        <div style={{fontFamily:"'Space Mono',monospace",fontSize:26,fontWeight:700,color:c.tc,lineHeight:1,marginBottom:8}}>
                          {pct(r.y)}
                        </div>
                        <div style={{fontSize:11,lineHeight:1.9,fontWeight:600}}>
                          <span style={{color:"var(--text2)"}}>ADR </span><span style={{fontFamily:"'Space Mono',monospace"}}>{brl(r.adr)}</span><br/>
                          <span style={{fontFamily:"'Space Mono',monospace"}}>{brl(Math.round(r.res))}</span><span style={{color:"var(--text3)",fontWeight:400}}>/mês</span><br/>
                          <span style={{fontSize:10,color:"var(--text3)",fontFamily:"'Space Mono',monospace"}}>{brl(r.preco)}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* RANKING */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden"}}>
            <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",background:"var(--bg2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text2)"}}>Ranking de Rentabilidade</span>
              <span style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>Clique no cabeçalho para ordenar</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>UH</th>
                    {[["Área","area"],["Andar","andar"],["ADR","adr"],["Resultado/mês","res"],["RevPAR/m²","rpm"],["Yield a.a.","y"]].map(([h,f])=>(
                      <th key={f} className={`sortable${sb===f?" sorted":""}`} onClick={()=>ts(f)}>
                        {h} <span style={{opacity:.5}}>{sb===f?(sd===-1?"↓":"↑"):"·"}</span>
                      </th>
                    ))}
                    <th>Vista</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((r,i)=>{
                    const c=yc(r.y);
                    return(
                      <tr key={r.id}>
                        <td style={{color:"var(--text3)",fontSize:11,fontFamily:"'Space Mono',monospace"}}>#{i+1}</td>
                        <td style={{fontWeight:600}}>{r.nome}</td>
                        <td style={{fontFamily:"'Space Mono',monospace",color:"var(--text2)"}}>{r.area}m²</td>
                        <td style={{color:"var(--text2)",textAlign:"center"}}>{r.andar}º</td>
                        <td style={{fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(r.adr)}</td>
                        <td style={{fontFamily:"'Space Mono',monospace",fontWeight:600}}>{brl(Math.round(r.res))}</td>
                        <td style={{fontFamily:"'Space Mono',monospace",color:"var(--text2)"}}>R${Math.round(r.rpm)}</td>
                        <td><span className={`badge ${c.cls}`} style={{fontFamily:"'Space Mono',monospace",fontSize:12}}>{pct(r.y)}</span></td>
                        <td style={{color:"var(--text2)",fontSize:12}}>{VISTAS.find(v=>v.key===r.vista)?.label}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:"10px 18px",borderTop:"1px solid var(--bg3)",background:"var(--bg2)",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>Modelo Cobb-Douglas α=0.60 / β=0.40 · AirDNA LTM Mar/2026 · Sazonalidade BD Repasse Lobie 2025</span>
              <span style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>Confidencial · {today}</span>
            </div>
          </div>

        </div>
      )}
    </div>
  );
}

function FG({l,children}){
  return(
    <div>
      <div style={{fontSize:10,color:"var(--text2)",marginBottom:5,fontWeight:600,letterSpacing:.3,textTransform:"uppercase"}}>{l}</div>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
